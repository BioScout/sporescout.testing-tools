name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package portable app
        run: npm run dist:portable

      - name: Smoke packaged linear-stage dashboard
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:SPORESCOUT_TESTING_TOOLS_EXACT_PORT = ''
          $env:SPORESCOUT_TESTING_TOOLS_USER_DATA = Join-Path $env:RUNNER_TEMP 'sporescout-testing-tools-smoke'
          $exe = Join-Path (Get-Location) 'release\win-unpacked\SporeScout Testing Tools.exe'
          $screenshot = Join-Path $env:RUNNER_TEMP 'linear-stage-mock-live-feedback.png'
          $process = Start-Process -FilePath $exe -ArgumentList '--remote-debugging-port=9225' -PassThru -WindowStyle Hidden
          try {
            node .\verification\electron-linear-stage-mock-live-cdp.mjs http://127.0.0.1:9225 $screenshot
          } finally {
            Start-Sleep -Milliseconds 500
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            Get-Process | Where-Object { $_.ProcessName -like 'SporeScout Testing Tools*' } | Stop-Process -Force -ErrorAction SilentlyContinue
          }

      - name: Upload portable app artifact
        uses: actions/upload-artifact@v4
        with:
          name: sporescout-testing-tools-portable
          path: release/*-portable.exe
          if-no-files-found: error

      - name: Publish tagged portable release
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run release:portable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
