name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-2022
    permissions:
      contents: write
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Package portable app
        run: npm run dist:portable

      - name: Smoke packaged linear-stage dashboard
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:SPORESCOUT_TESTING_TOOLS_EXACT_PORT = ''
          $env:SPORESCOUT_TESTING_TOOLS_USER_DATA = Join-Path $env:RUNNER_TEMP 'sporescout-testing-tools-smoke'
          $exe = Join-Path (Get-Location) 'release\win-unpacked\SporeScout Testing Tools.exe'
          $screenshot = Join-Path $env:RUNNER_TEMP 'linear-stage-mock-live-feedback.png'
          $process = Start-Process -FilePath $exe -ArgumentList '--remote-debugging-port=9225' -PassThru -WindowStyle Hidden
          try {
            node .\verification\electron-linear-stage-mock-live-cdp.mjs http://127.0.0.1:9225 $screenshot
          } finally {
            Start-Sleep -Milliseconds 500
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            Get-Process | Where-Object { $_.ProcessName -like 'SporeScout Testing Tools*' } | Stop-Process -Force -ErrorAction SilentlyContinue
          }

      - name: Smoke packaged cartridge dashboard history
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $packageVersion = (Get-Content .\package.json | ConvertFrom-Json).version
          $versionParts = $packageVersion.Split('.')
          $displayVersion = '{0}.{1:D2}' -f [int]$versionParts[0], [int]$versionParts[1]
          $env:SPORESCOUT_TESTING_TOOLS_EXACT_PORT = 'NO_REAL_PORT_FOR_RENDER_SMOKE'
          $env:SPORESCOUT_HISTORY_SMOKE_USER_DATA = Join-Path $env:RUNNER_TEMP 'sporescout-testing-tools-cartridge-history-smoke'
          $env:SPORESCOUT_EXPECT_HISTORY_TEXT = "SS-SA-007-030-0169|Harry Blake|P1-STAGE-2026-05|App v$displayVersion|Borderline|0.272|Min|Max"
          python .\verification\seed-cartridge-history-smoke.py
          $exe = Join-Path (Get-Location) 'release\win-unpacked\SporeScout Testing Tools.exe'
          $screenshot = Join-Path $env:RUNNER_TEMP 'cartridge-history-smoke.png'
          $process = Start-Process -FilePath $exe -ArgumentList "--user-data-dir=$env:SPORESCOUT_HISTORY_SMOKE_USER_DATA", '--remote-debugging-port=9231' -PassThru -WindowStyle Hidden
          try {
            node .\verification\electron-cartridge-mock-cdp.mjs http://127.0.0.1:9231 $screenshot
          } finally {
            Start-Sleep -Milliseconds 500
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
            Get-Process | Where-Object { $_.ProcessName -like 'SporeScout Testing Tools*' } | Stop-Process -Force -ErrorAction SilentlyContinue
          }

      - name: Upload portable app artifact
        uses: actions/upload-artifact@v4
        with:
          name: sporescout-testing-tools-portable
          path: release/*-portable.exe
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run release:all
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
